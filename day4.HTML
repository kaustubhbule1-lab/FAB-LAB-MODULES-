<!DOCTYPE html>
<html>
<head>
<title>Flexbox Project</title>

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
font-family:Arial;
}

/* Big Box */

.container{
width:400px;
height:200px;
border:3px solid black;
display:flex;
justify-content:space-around;
align-items:center;
margin-top:50px;
}

/* Small Boxes */

.box{
width:100px;
height:100px;
background:skyblue;
border:2px solid black;
}

/* Circle Row */

.circle-row{
display:flex;
gap:20px;
margin-top:40px;
}

/* Circles */

.circle{
width:80px;
height:80px;
background:orange;
border-radius: 50%;
border:2px solid black;
}

</style>
</head>

<body>

<div class="container">

<div class="box"></div>
<div class="box"></div>

</div>

<div class="circle-column">

<div class="circle"></div>



<div class="circle"></div>

</div>

</body>
</html>
